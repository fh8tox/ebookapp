name: ebookapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  provider: ^6.0.5
  dio: ^5.4.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.0
  file_picker: ^8.0.0
  http: ^1.0.0
  http_parser: ^4.0.2
  flutter_spinkit: ^5.2.0
  firebase_app_check: ^0.3.2+10
  epub_view: ^3.2.0
  syncfusion_flutter_pdfviewer: ^27.2.0
  shared_preferences: ^2.2.2
  flutter_html: ^3.0.0-beta.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true   # 👈 THÊM DÒNG NÀY
  assets:
    - assets/images/           # nếu bạn có dùng ảnh

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/mindbook.png"